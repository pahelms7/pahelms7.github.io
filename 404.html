<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found — Helms Performance</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f8f8f8; }
    .not-found {
      max-width: 600px;
      margin: 6rem auto;
      padding: 2rem;
      text-align: center;
    }
    .not-found h1 { font-size: 4rem; margin: 0 0 0.5rem; color: #1a2b4a; }
    .not-found p { font-size: 1.1rem; color: #555; line-height: 1.6; }
    .not-found a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #1a2b4a;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .not-found a:hover { background: #c0392b; }
  </style>
</head>
<body>
  <main class="not-found">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a href="/">Return to Helms Performance</a>
  </main>
</body>
</html>
